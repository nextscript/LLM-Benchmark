{% extends "base.html" %}

{% block title %}Results - LLM Benchmark{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-list-check text-info"></i> All Results</h2>

<div class="table-responsive">
    <table class="table table-dark table-hover table-striped align-middle benchmark-table results-table" id="resultsTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Model</th>
                <th>Prompt</th>
                <th class="badge-column">Badges</th>
                <th>Gen tok/s</th>
                <th>Elapsed</th>
                <th>Quality</th>
                <th>Format</th>
                <th>Consistency</th>
                <th>Stability</th>
                <th>Score</th>
                <th>Self-Val.</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            <tr><td colspan="15" class="text-center text-muted">Loading...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadResults();
    });
</script>
{% endblock %}
